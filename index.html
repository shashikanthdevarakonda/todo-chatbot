<!doctype html>
<html>
  <head>
    <title>Zavoir Todo Bot</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>

  <body>
    <div class="chat-container">
      <div class="chat-header">🤖 Zevoir Assistant</div>

      <div id="chat-box" class="chat-box"></div>

      <div class="input-area">
        <input type="text" id="message" placeholder="Enter message" />
        <button onclick="sendMessage()">Send</button>
        <button class="clear-btn" onclick="clearChat()">Clear Chat</button>
      </div>
    </div>

    <script>
      async function sendMessage() {
        const input = document.getElementById("message");
        const chatBox = document.getElementById("chat-box");
        const message = input.value.trim();

        if (!message) return;

        // USER MESSAGE
        chatBox.innerHTML += `<div class="user-msg">${message}</div>`;
        input.value = "";

        autoScroll();

        // BOT TYPING
        const typing = document.createElement("div");
        typing.className = "bot-msg";
        typing.innerText = "Bot is typing...";
        chatBox.appendChild(typing);

        autoScroll();

        try {
          const response = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message }),
          });

          const data = await response.json();

          // delay bot reply (5 seconds)
          setTimeout(() => {
            typing.remove();

            const botReply = document.createElement("div");
            botReply.className = "bot-msg";
            botReply.innerText = data.reply;

            chatBox.appendChild(botReply);

            autoScroll();
          }, 5000);
        } catch (error) {
          typing.remove();

          chatBox.innerHTML += `<div class="bot-msg">Something went wrong. Please try again.</div>`;
        }
      }

      function autoScroll() {
        const chatBox = document.getElementById("chat-box");
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      function clearChat() {
        document.getElementById("chat-box").innerHTML = "";
      }

      // ENTER KEY
      document
        .getElementById("message")
        .addEventListener("keypress", function (e) {
          if (e.key === "Enter") {
            sendMessage();
          }
        });
    </script>
  </body>
</html>
